<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECUS Agency · Hablemos</title>
    <meta name="description" content="Conecta con ECUS Agency por WhatsApp. Estrategia, contenido y publicidad para hacer crecer tu negocio.">
    <meta property="og:title" content="ECUS Agency · Hablemos">
    <meta property="og:description" content="Estamos a un mensaje de distancia.">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --purple:#3B2D8F;
            --purple-light:#5544b0;
            --purple-dark:#2a1f6e;
            --orange:#F5921E;
            --orange-light:#feb24a;
            --whatsapp:#25D366;
            --whatsapp-dark:#1da851;
            --text:#1a1535;
            --text-light:#6b6894;
        }
        html,body{height:100%}
        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 50%,var(--purple-light) 100%);
            color:#fff;
            line-height:1.6;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            position:relative;
            overflow-x:hidden;
        }
        body::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(245,146,30,.15) 0%,transparent 70%);pointer-events:none;animation:float 14s ease-in-out infinite}
        body::after{content:'';position:absolute;bottom:-300px;left:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,146,30,.08) 0%,transparent 70%);pointer-events:none;animation:float 18s ease-in-out infinite reverse}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.05)}}

        .container{max-width:560px;width:100%;margin:0 auto;padding:40px 24px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;z-index:1}

        /* ── LOGO ── */
        .logo{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:36px;font-weight:800;letter-spacing:1px}
        .logo .logo-name{font-size:2.2rem;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;letter-spacing:2px}
        .logo .logo-tag{font-size:.75rem;color:var(--orange);font-weight:800;letter-spacing:4px;text-transform:uppercase}

        /* ── HERO ── */
        h1{font-size:2.2rem;font-weight:800;letter-spacing:-.5px;margin-bottom:14px;line-height:1.15}
        @media(max-width:500px){h1{font-size:1.7rem}}
        .accent{color:var(--orange)}
        .lead{font-size:1.05rem;color:rgba(255,255,255,.85);margin-bottom:36px;max-width:460px;font-weight:400}

        /* ── BTN WA ── */
        .wa-btn{
            display:inline-flex;align-items:center;gap:14px;
            background:var(--whatsapp);color:#fff;
            padding:20px 36px;border-radius:18px;
            font-size:1.1rem;font-weight:700;
            text-decoration:none;
            box-shadow:0 12px 40px rgba(37,211,102,.35),0 4px 12px rgba(0,0,0,.2);
            transition:transform .2s,box-shadow .2s;
            position:relative;
            animation:pulse 2.4s infinite;
        }
        .wa-btn:hover{transform:translateY(-3px);background:var(--whatsapp-dark);box-shadow:0 18px 50px rgba(37,211,102,.5),0 6px 16px rgba(0,0,0,.3)}
        .wa-btn:active{transform:translateY(-1px)}
        .wa-btn svg{width:30px;height:30px;flex-shrink:0}
        @keyframes pulse{0%,100%{box-shadow:0 12px 40px rgba(37,211,102,.35),0 4px 12px rgba(0,0,0,.2),0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 12px 40px rgba(37,211,102,.35),0 4px 12px rgba(0,0,0,.2),0 0 0 16px rgba(37,211,102,0)}}

        .secondary{margin-top:20px;font-size:.85rem;color:rgba(255,255,255,.6);font-weight:500}
        .secondary a{color:var(--orange-light);text-decoration:none;font-weight:600}
        .secondary a:hover{color:var(--orange)}

        /* ── PROOF ── */
        .proof{margin-top:40px;display:flex;flex-wrap:wrap;justify-content:center;gap:18px;max-width:480px}
        .proof-item{display:flex;align-items:center;gap:8px;font-size:.78rem;color:rgba(255,255,255,.7);font-weight:500}
        .proof-item .dot{width:6px;height:6px;border-radius:50%;background:var(--orange)}

        /* ── FOOTER ── */
        .footer{padding:24px;text-align:center;font-size:.72rem;color:rgba(255,255,255,.5);position:relative;z-index:1}
        .footer .links{display:flex;justify-content:center;gap:18px;margin-top:6px;flex-wrap:wrap}
        .footer a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:500;transition:color .2s}
        .footer a:hover{color:var(--orange)}
    </style>
</head>
<body>

    <div class="links">

</body>
</html>
