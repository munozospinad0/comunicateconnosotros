<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECUS Agency · Hablemos</title>
    <meta name="description" content="Conecta con ECUS Agency por WhatsApp.">
    <meta property="og:title" content="ECUS Agency · Hablemos">
    <meta property="og:description" content="Estamos a un mensaje de distancia.">
    <link rel="icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --purple:#3B2D8F;
            --purple-2:#5544b0;
            --purple-deep:#241a5e;
            --orange:#F5921E;
            --orange-2:#feb24a;
            --whatsapp:#25D366;
            --whatsapp-dark:#1da851;
        }
        html,body{min-height:100%}
        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:radial-gradient(ellipse at top,var(--purple-2) 0%,var(--purple) 35%,var(--purple-deep) 100%);
            color:#fff;
            line-height:1.55;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            position:relative;
            overflow-x:hidden;
            -webkit-font-smoothing:antialiased;
        }
        /* Decoración: orbes naranjas suaves */
        .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
        .orb-1{width:380px;height:380px;background:rgba(245,146,30,.18);top:-120px;right:-100px;animation:float1 16s ease-in-out infinite}
        .orb-2{width:480px;height:480px;background:rgba(245,146,30,.10);bottom:-200px;left:-150px;animation:float2 22s ease-in-out infinite}
        @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px) scale(1.08)}}
        @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px) scale(1.05)}}

        .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;position:relative;z-index:1}

        /* ── CARD PRINCIPAL ── */
        .card{
            max-width:520px;width:100%;
            background:rgba(255,255,255,.04);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            border:1px solid rgba(255,255,255,.08);
            border-radius:28px;
            padding:48px 36px 40px;
            text-align:center;
            box-shadow:0 30px 80px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.03) inset;
        }
        @media(max-width:480px){.card{padding:36px 22px 28px;border-radius:24px}}

        /* ── LOGO ── */
        .logo-box{display:inline-block;background:#fff;border-radius:18px;padding:14px 22px;margin-bottom:28px;box-shadow:0 12px 32px rgba(0,0,0,.18)}
        .logo-box img{height:54px;width:auto;display:block}
        @media(max-width:480px){.logo-box img{height:46px}}

        /* ── TITULAR ── */
        h1{
            font-size:2rem;font-weight:800;
            letter-spacing:-.6px;line-height:1.1;
            margin-bottom:14px;
        }
        @media(max-width:480px){h1{font-size:1.55rem}}
        h1 .accent{color:var(--orange);position:relative;display:inline-block}
        h1 .accent::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:6px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.4;border-radius:6px}

        .lead{font-size:1rem;color:rgba(255,255,255,.78);margin-bottom:34px;font-weight:400;max-width:420px;margin-left:auto;margin-right:auto}
        @media(max-width:480px){.lead{font-size:.92rem;margin-bottom:28px}}

        /* ── BOTÓN WA ── */
        .wa-btn{
            display:inline-flex;align-items:center;justify-content:center;gap:14px;
            width:100%;max-width:380px;
            background:linear-gradient(135deg,var(--whatsapp) 0%,#1ebe5d 100%);
            color:#fff;
            padding:20px 28px;border-radius:16px;
            font-size:1.05rem;font-weight:700;letter-spacing:.2px;
            text-decoration:none;
            box-shadow:0 14px 36px rgba(37,211,102,.4),0 0 0 0 rgba(37,211,102,.5);
            transition:transform .2s ease,box-shadow .25s ease;
            position:relative;overflow:hidden;
            animation:pulse 2.6s ease-in-out infinite;
        }
        .wa-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .6s ease}
        .wa-btn:hover{transform:translateY(-3px);box-shadow:0 20px 50px rgba(37,211,102,.55)}
        .wa-btn:hover::before{left:100%}
        .wa-btn:active{transform:translateY(-1px)}
        .wa-btn svg{width:28px;height:28px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.2))}
        @keyframes pulse{0%,100%{box-shadow:0 14px 36px rgba(37,211,102,.4),0 0 0 0 rgba(37,211,102,.45)}50%{box-shadow:0 14px 36px rgba(37,211,102,.4),0 0 0 14px rgba(37,211,102,0)}}

        /* ── BADGES ── */
        .badges{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin-top:30px}
        .badge{display:flex;align-items:center;gap:7px;font-size:.78rem;color:rgba(255,255,255,.7);font-weight:500}
        .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--orange);box-shadow:0 0 12px var(--orange)}

        /* ── FOOTER ── */
        .footer{padding:24px 20px;text-align:center;font-size:.74rem;color:rgba(255,255,255,.5);position:relative;z-index:1}
        .footer .line{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:6px}
        .footer a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:500;transition:color .2s}
        .footer a:hover{color:var(--orange)}
        .footer .sep{color:rgba(255,255,255,.3)}
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
    <div class="card">
        <div class="logo-box">
            <img src="logo.png" alt="ECUS Agency">
        </div>

        <h1>Estamos a un mensaje de <span class="accent">distancia</span>.</h1>
        <p class="lead">Cuéntanos sobre tu negocio por WhatsApp y diseñamos una estrategia para hacerlo crecer.</p>

        <a class="wa-btn" href="https://api.whatsapp.com/send/?phone=50764482876&text=Hola%20ECUS%2C%20me%20gustar%C3%ADa%20saber%20m%C3%A1s%20sobre%20sus%20servicios&type=phone_number&app_absent=0" target="_blank" rel="noopener">
            <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.001 2.667C8.638 2.667 2.667 8.638 2.667 16c0 2.353.612 4.624 1.776 6.624L2.667 29.333l6.876-1.752c1.928 1.05 4.097 1.605 6.458 1.605 7.363 0 13.334-5.97 13.334-13.333S23.364 2.667 16.001 2.667zm0 24.42a11.04 11.04 0 0 1-5.625-1.546l-.402-.24-4.166 1.06 1.114-4.07-.262-.418A11.046 11.046 0 0 1 4.92 16c0-6.115 4.965-11.08 11.082-11.08 6.116 0 11.081 4.965 11.081 11.08-.002 6.115-4.967 11.087-11.082 11.087zm6.107-8.296c-.336-.169-1.987-.984-2.295-1.097-.308-.114-.531-.169-.755.169-.224.336-.866 1.097-1.062 1.32-.196.224-.392.252-.728.084-.336-.169-1.418-.523-2.7-1.665-.998-.89-1.672-1.99-1.868-2.326-.196-.336-.021-.518.147-.685.151-.151.336-.392.504-.588.169-.196.224-.336.336-.56.112-.224.056-.42-.028-.588-.084-.169-.756-1.82-1.034-2.49-.272-.654-.55-.566-.755-.578-.196-.011-.42-.013-.643-.013s-.588.084-.896.42c-.308.336-1.176 1.148-1.176 2.798s1.204 3.247 1.371 3.471c.169.224 2.367 3.616 5.738 5.073 1.56.674 2.778 1.076 3.728 1.378 1.566.498 2.991.428 4.117.26 1.256-.188 1.987-1.014 2.268-1.99.281-.978.281-1.815.196-1.99-.084-.169-.308-.272-.643-.44z"/>
            </svg>
            Hablemos por WhatsApp
        </a>

        <div class="badges">
            <div class="badge"><span class="dot"></span>Respuesta rápida</div>
            <div class="badge"><span class="dot"></span>Sin compromiso</div>
            <div class="badge"><span class="dot"></span>Estrategia personalizada</div>
        </div>
    </div>
</div>

<div class="footer">
    <div>ECUS Agency · Panamá</div>
    <div class="line">
        <a href="https://www.ecus.agency/" target="_blank" rel="noopener">ecus.agency</a>
        <span class="sep">·</span>
        <a href="https://www.instagram.com/ecusagency/" target="_blank" rel="noopener">@ecusagency</a>
    </div>
</div>

</body>
</html>
